<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Scorecard" />
  <meta name="theme-color" content="#09090b" />
  <title>Daily Scorecard</title>
  <style>
    * { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
    body {
      background:#09090b; color:#e4e4e7;
      font-family:Georgia,serif; min-height:100vh;
      padding-bottom:90px; padding-top:env(safe-area-inset-top);
    }
    #app { max-width:480px; margin:0 auto; }
    .header { padding:20px 20px 12px; border-bottom:1px solid #27272a; display:flex; justify-content:space-between; align-items:center; }
    .header-title { font-size:22px; font-weight:700; letter-spacing:-0.5px; }
    .header-date  { font-size:12px; color:#71717a; margin-top:2px; }
    .nav { display:flex; border-bottom:1px solid #27272a; }
    .nav-btn { flex:1; padding:12px 0; background:none; border:none; color:#52525b; border-bottom:2px solid transparent; cursor:pointer; font-size:13px; transition:color 0.2s; font-family:Georgia,serif; }
    .nav-btn.active { color:#e4e4e7; border-bottom:2px solid #e4e4e7; }
    .view { display:none; padding:20px 16px; }
    .view.active { display:block; }
    .cat-label { font-size:11px; font-weight:700; letter-spacing:2px; text-transform:uppercase; margin-bottom:10px; padding-left:4px; }
    .q-card { background:#18181b; border:1px solid #27272a; border-radius:12px; padding:14px; margin-bottom:8px; transition:border 0.2s; }
    .q-card.yes { border-color:rgba(74,222,128,0.33); }
    .q-card.no  { border-color:rgba(248,113,113,0.33); }
    .q-text { font-size:13px; margin-bottom:10px; display:flex; gap:8px; align-items:flex-start; line-height:1.5; }
    .q-btn { flex:1; padding:8px 0; border-radius:8px; border:none; background:#27272a; color:#a1a1aa; font-weight:700; font-size:13px; cursor:pointer; transition:all 0.15s; font-family:Georgia,serif; }
    .q-btn.yes-active { background:#4ade80; color:#052e16; }
    .q-btn.no-active  { background:#f87171; color:#450a0a; }
    .q-btn:disabled { cursor:default; }
    .result-box { border-radius:16px; padding:28px 20px; text-align:center; margin-bottom:20px; border:1px solid transparent; }
    .intro-box { background:#18181b; border-radius:16px; padding:16px; margin-bottom:20px; display:flex; align-items:center; gap:12px; }
    .submit-btn { width:100%; padding:16px; border-radius:12px; border:none; font-weight:700; font-size:15px; transition:all 0.2s; margin-top:8px; font-family:Georgia,serif; }
    .submit-btn.ready   { background:#e4e4e7; color:#09090b; cursor:pointer; }
    .submit-btn.waiting { background:#27272a; color:#52525b; cursor:default; }
  </style>
</head>
<body>
<div id="app">
  <div style="min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#71717a;gap:16px">
    <div style="font-size:32px">✦</div>
    <div style="font-size:14px">Loading…</div>
  </div>
</div>

<script type="module">
import { initializeApp }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, doc, getDoc, setDoc, collection, getDocs, deleteDoc }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

// ── PASTE YOUR FIREBASE CONFIG HERE ──────────────────────────────────────────
const firebaseConfig = {
  apiKey:            "AIzaSyAu5PZP0rRuTsWlk-5zF0GOAMbUGjYBYQ0",
  authDomain:        "daily-scorecard-62031.firebaseapp.com",
  projectId:         "daily-scorecard-62031",
  storageBucket:     "daily-scorecard-62031.firebasestorage.app",
  messagingSenderId: "647221313494",
  appId:             "1:647221313494:web:f4755a965e75b044a46e77"
};
// ─────────────────────────────────────────────────────────────────────────────

const app  = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db   = getFirestore(app);

const DEFAULT_QUESTIONS = [
  { id:"q1",  category:"nutrition", emoji:"🥗", text:"Did you eat a vegetable with at least one meal?" },
  { id:"q2",  category:"nutrition", emoji:"🧂", text:"Did you avoid high-sodium or heavily processed foods?" },
  { id:"q3",  category:"nutrition", emoji:"💧", text:"Did you drink enough water today?" },
  { id:"q4",  category:"nutrition", emoji:"🛑", text:"Did you avoid late-night snacking?" },
  { id:"q5",  category:"movement",  emoji:"🏃", text:"Did you get intentional exercise or movement?" },
  { id:"q6",  category:"movement",  emoji:"🚶", text:"Did you take breaks from sitting throughout the day?" },
  { id:"q7",  category:"sleep",     emoji:"😴", text:"Did you get at least 7 hours of sleep last night?" },
  { id:"q8",  category:"sleep",     emoji:"📵", text:"Did you avoid screens for 30+ min before bed?" },
  { id:"q9",  category:"mind",      emoji:"📖", text:"Did you read, learn, or practice a skill today?" },
  { id:"q10", category:"mind",      emoji:"🧘", text:"Did you take a moment to decompress or breathe intentionally?" },
];

const CATEGORY_META = {
  nutrition: { label:"Nutrition", color:"#4ade80" },
  movement:  { label:"Movement",  color:"#60a5fa" },
  sleep:     { label:"Sleep",     color:"#a78bfa" },
  mind:      { label:"Mind",      color:"#fbbf24" },
};
const CAT_EMOJIS = { nutrition:"🥗", movement:"🏃", sleep:"😴", mind:"📖" };

function todayKey() { return new Date().toISOString().slice(0,10); }
function weekKeys() {
  const keys = [];
  for (let i=6; i>=0; i--) {
    const d = new Date(); d.setDate(d.getDate()-i);
    keys.push(d.toISOString().slice(0,10));
  }
  return keys;
}
function getDayLabel(s) {
  return ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"][new Date(s+"T12:00:00").getDay()];
}
function scoreColor(pct) {
  if (pct >= 0.75) return { bg:"#14532d", text:"#4ade80", label:"Great Day",  emoji:"🌟" };
  if (pct >= 0.5)  return { bg:"#713f12", text:"#fbbf24", label:"Decent Day", emoji:"👍" };
  return                   { bg:"#450a0a", text:"#f87171", label:"Rough Day",  emoji:"💪" };
}

// ── State ──
let user      = null;
let questions = [];
let history   = {};
let todayData = { answers:{}, submitted:false };
let currentView = "checkin";
let editingId   = null;

// ── Firestore helpers ──
const uDoc = (...path) => doc(db, "users", user.uid, ...path);
const uCol = (name)    => collection(db, "users", user.uid, name);

async function loadUserData() {
  // Questions
  const qSnap = await getDocs(uCol("questions"));
  if (qSnap.empty) {
    questions = DEFAULT_QUESTIONS;
    await saveQuestions();
  } else {
    questions = [];
    qSnap.forEach(d => questions.push(d.data()));
    questions.sort((a,b) => (a.order||0) - (b.order||0));
  }
  // History
  const hSnap = await getDocs(uCol("checkins"));
  history = {};
  hSnap.forEach(d => { history[d.id] = d.data(); });
  // Today
  const tSnap = await getDoc(uDoc("checkins", todayKey()));
  if (tSnap.exists()) {
    const data = tSnap.data();
    todayData = { answers: data.answers||{}, submitted: data.submitted||false };
    history[todayKey()] = data;
  } else {
    todayData = { answers:{}, submitted:false };
  }
}

async function saveQuestions() {
  const snap = await getDocs(uCol("questions"));
  for (const d of snap.docs) await deleteDoc(d.ref);
  for (let i=0; i<questions.length; i++) {
    await setDoc(doc(db,"users",user.uid,"questions",questions[i].id), { ...questions[i], order:i });
  }
}

async function saveTodayCheckin() {
  const yesCount = questions.filter(q => todayData.answers[q.id]===true).length;
  const pct = questions.length > 0 ? yesCount / questions.length : 0;
  const data = { answers:todayData.answers, submitted:todayData.submitted, pct, yes:yesCount, total:questions.length, date:todayKey() };
  await setDoc(uDoc("checkins", todayKey()), data);
  history[todayKey()] = data;
}

// ── Auth ──
onAuthStateChanged(auth, async (u) => {
  user = u;
  if (u) {
    showLoading("Loading your data…");
    await loadUserData();
    renderShell();
    render();
  } else {
    renderLogin();
  }
});

function showLoading(msg) {
  document.getElementById("app").innerHTML = `
    <div style="min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#71717a;gap:16px">
      <div style="font-size:32px">✦</div><div style="font-size:14px">${msg}</div>
    </div>`;
}

function renderLogin() {
  document.getElementById("app").innerHTML = `
    <div style="min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px;text-align:center">
      <div style="font-size:48px;margin-bottom:16px">✦</div>
      <div style="font-size:26px;font-weight:700;letter-spacing:-0.5px;margin-bottom:8px">Daily Scorecard</div>
      <div style="font-size:14px;color:#71717a;margin-bottom:40px;line-height:1.6">Track your nutrition, movement,<br>sleep & mind — every day.</div>
      <button id="signin-btn" style="display:flex;align-items:center;gap:12px;padding:14px 24px;background:#e4e4e7;color:#09090b;border:none;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;font-family:Georgia,serif;">
        <svg width="20" height="20" viewBox="0 0 24 24">
          <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
          <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
          <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/>
          <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
        </svg>
        Sign in with Google
      </button>
    </div>`;
  document.getElementById("signin-btn").addEventListener("click", async () => {
    try { await signInWithPopup(auth, new GoogleAuthProvider()); }
    catch(e) { alert("Sign-in failed: " + e.message); }
  });
}

function renderShell() {
  document.getElementById("app").innerHTML = `
    <div class="header">
      <div>
        <div class="header-title">Daily Scorecard</div>
        <div class="header-date">${new Date().toLocaleDateString("en-US",{weekday:"long",month:"long",day:"numeric"})}</div>
      </div>
      <div style="display:flex;align-items:center;gap:12px">
        ${user.photoURL ? `<img id="avatar" src="${user.photoURL}" style="width:30px;height:30px;border-radius:50%;cursor:pointer" title="Sign out">` : ""}
        <div style="font-size:28px">✦</div>
      </div>
    </div>
    <div class="nav">
      <button class="nav-btn active" data-view="checkin">Check-In</button>
      <button class="nav-btn" data-view="history">History</button>
      <button class="nav-btn" data-view="settings">Questions</button>
    </div>
    <div id="view-checkin" class="view active"></div>
    <div id="view-history" class="view"></div>
    <div id="view-settings" class="view"></div>`;

  const avatar = document.getElementById("avatar");
  if (avatar) avatar.addEventListener("click", () => { if (confirm("Sign out?")) signOut(auth); });

  document.querySelectorAll(".nav-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      currentView = btn.dataset.view;
      document.querySelectorAll(".nav-btn").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      document.querySelectorAll(".view").forEach(v => v.classList.remove("active"));
      document.getElementById("view-"+currentView).classList.add("active");
      render();
    });
  });
}

function render() {
  if (currentView==="checkin")  renderCheckin();
  if (currentView==="history")  renderHistory();
  if (currentView==="settings") renderSettings();
}

// ── Check-In ──
function renderCheckin() {
  const el = document.getElementById("view-checkin");
  const { answers, submitted } = todayData;
  const yesCount = questions.filter(q => answers[q.id]===true).length;
  const pct = questions.length > 0 ? yesCount/questions.length : 0;
  const col = scoreColor(pct);

  let html = submitted
    ? `<div class="result-box" style="background:${col.bg};border-color:${col.text}33">
        <div style="font-size:48px;margin-bottom:8px">${col.emoji}</div>
        <div style="font-size:22px;font-weight:700;color:${col.text}">${col.label}</div>
        <div style="font-size:14px;color:#a1a1aa;margin-top:6px">${yesCount} of ${questions.length} habits hit</div>
        <div style="margin-top:16px;height:8px;background:#27272a;border-radius:99px;overflow:hidden">
          <div style="height:100%;width:${pct*100}%;background:${col.text};border-radius:99px;transition:width 0.8s ease"></div>
        </div>
      </div>`
    : `<div class="intro-box">
        <div style="font-size:32px">📋</div>
        <div><div style="font-size:14px;font-weight:600">How was your day?</div>
        <div style="font-size:12px;color:#71717a">Answer each habit below, then tap Submit</div></div>
      </div>`;

  Object.keys(CATEGORY_META).forEach(cat => {
    const qs = questions.filter(q => q.category===cat);
    if (!qs.length) return;
    html += `<div style="margin-bottom:20px">
      <div class="cat-label" style="color:${CATEGORY_META[cat].color}">${CATEGORY_META[cat].label}</div>`;
    qs.forEach(q => {
      const ans = answers[q.id];
      html += `<div class="q-card ${ans===true?"yes":ans===false?"no":""}">
        <div class="q-text"><span>${q.emoji}</span><span>${q.text}</span></div>
        <div style="display:flex;gap:8px">
          <button class="q-btn ${ans===true?"yes-active":""}" ${submitted?"disabled":""} data-id="${q.id}" data-val="true">✓ Yes</button>
          <button class="q-btn ${ans===false?"no-active":""}" ${submitted?"disabled":""} data-id="${q.id}" data-val="false">✗ No</button>
        </div>
      </div>`;
    });
    html += `</div>`;
  });

  if (!submitted) {
    const answered = questions.every(q => answers[q.id]!==undefined);
    const remaining = questions.filter(q => answers[q.id]===undefined).length;
    html += `<button class="submit-btn ${answered?"ready":"waiting"}" id="submit-btn" ${answered?"":"disabled"}>
      ${answered ? "Submit Today's Check-In" : `Answer all ${remaining} remaining…`}
    </button>`;
  }

  el.innerHTML = html;

  el.querySelectorAll(".q-btn").forEach(btn => {
    btn.addEventListener("click", async () => {
      const id = btn.dataset.id;
      const val = btn.dataset.val === "true";
      todayData.answers[id] = val;
      renderCheckin();
      await saveTodayCheckin();
    });
  });

  const submitBtn = el.querySelector("#submit-btn");
  if (submitBtn) {
    submitBtn.addEventListener("click", async () => {
      todayData.submitted = true;
      await saveTodayCheckin();
      renderCheckin();
    });
  }
}

// ── History ──
function renderHistory() {
  const el = document.getElementById("view-history");
  let html = `<div style="font-size:13px;font-weight:700;letter-spacing:1.5px;color:#71717a;text-transform:uppercase;margin-bottom:16px">Last 7 Days</div>
    <div style="display:flex;gap:8px;margin-bottom:28px">`;

  weekKeys().forEach(k => {
    const d = history[k];
    const isToday = k===todayKey();
    const p = d ? d.pct : null;
    const col = p!==null ? scoreColor(p) : null;
    const border = isToday ? "2px solid #e4e4e7" : `1px solid ${col?col.text+"44":"#27272a"}`;
    html += `<div style="flex:1;text-align:center;background:${col?col.bg:"#18181b"};border:${border};border-radius:10px;padding:12px 4px">
      <div style="font-size:10px;color:#71717a;margin-bottom:4px">${getDayLabel(k)}</div>
      <div style="font-size:16px">${p===null?"–":p>=0.75?"🟢":p>=0.5?"🟡":"🔴"}</div>
      ${d?`<div style="font-size:10px;color:${col.text};margin-top:4px;font-weight:700">${Math.round(p*100)}%</div>`:""}
    </div>`;
  });
  html += `</div>`;

  const keys = Object.keys(history).sort().reverse();
  if (!keys.length) {
    html += `<div style="text-align:center;color:#52525b;padding:40px 0">No history yet — complete your first check-in!</div>`;
  } else {
    keys.forEach(k => {
      const d = history[k];
      if (!d) return;
      const col = scoreColor(d.pct);
      const dateStr = new Date(k+"T12:00:00").toLocaleDateString("en-US",{weekday:"long",month:"short",day:"numeric"});
      html += `<div style="background:#18181b;border-radius:12px;padding:14px 16px;margin-bottom:10px;display:flex;align-items:center;gap:14px;border:1px solid #27272a">
        <div style="width:44px;height:44px;border-radius:10px;background:${col.bg};display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;border:1px solid ${col.text}44">${col.emoji}</div>
        <div style="flex:1">
          <div style="font-size:13px;font-weight:600">${dateStr}</div>
          <div style="font-size:12px;color:#71717a;margin-top:2px">${d.yes} of ${d.total} habits</div>
        </div>
        <div style="font-size:16px;font-weight:700;color:${col.text}">${Math.round(d.pct*100)}%</div>
      </div>`;
    });
  }
  el.innerHTML = html;
}

// ── Settings ──
function renderSettings() {
  const el = document.getElementById("view-settings");
  let html = `<div style="font-size:13px;color:#71717a;margin-bottom:16px;line-height:1.6">Customize your daily questions. Tap a question to edit it, or add new ones below.</div>`;

  Object.keys(CATEGORY_META).forEach(cat => {
    const qs = questions.filter(q => q.category===cat);
    if (!qs.length) return;
    html += `<div style="margin-bottom:20px">
      <div class="cat-label" style="color:${CATEGORY_META[cat].color}">${CATEGORY_META[cat].label}</div>`;
    qs.forEach(q => {
      if (editingId===q.id) {
        html += `<div style="background:#18181b;border-radius:12px;padding:14px;margin-bottom:8px;border:1px solid #3f3f46">
          <textarea id="edit-${q.id}" rows="2" style="width:100%;background:#27272a;border:none;border-radius:8px;padding:10px;color:#e4e4e7;font-size:13px;font-family:Georgia,serif;resize:none">${q.text}</textarea>
          <div style="display:flex;gap:8px;margin-top:8px">
            <button data-action="save" data-id="${q.id}" style="flex:1;padding:8px;border-radius:8px;border:none;background:#4ade80;color:#052e16;font-weight:700;font-size:13px;cursor:pointer;font-family:Georgia,serif">Save</button>
            <button data-action="cancel" style="flex:1;padding:8px;border-radius:8px;border:none;background:#27272a;color:#a1a1aa;font-weight:700;font-size:13px;cursor:pointer;font-family:Georgia,serif">Cancel</button>
            <button data-action="delete" data-id="${q.id}" style="padding:8px 14px;border-radius:8px;border:none;background:#450a0a;color:#f87171;font-weight:700;font-size:13px;cursor:pointer;font-family:Georgia,serif">Delete</button>
          </div>
        </div>`;
      } else {
        html += `<div data-action="edit" data-id="${q.id}" style="background:#18181b;border-radius:12px;padding:12px 14px;margin-bottom:8px;display:flex;gap:10px;align-items:center;cursor:pointer;border:1px solid #27272a">
          <span>${q.emoji}</span>
          <span style="flex:1;font-size:13px;line-height:1.5">${q.text}</span>
          <span style="color:#52525b;font-size:16px">›</span>
        </div>`;
      }
    });
    html += `</div>`;
  });

  html += `<div style="background:#18181b;border-radius:12px;padding:16px;border:1px solid #27272a;margin-top:8px">
    <div style="font-size:12px;font-weight:700;color:#71717a;margin-bottom:10px;letter-spacing:1px">ADD A QUESTION</div>
    <select id="new-cat" style="width:100%;background:#27272a;border:none;border-radius:8px;padding:10px;color:#e4e4e7;font-size:13px;font-family:Georgia,serif;margin-bottom:10px">
      ${Object.entries(CATEGORY_META).map(([k,v])=>`<option value="${k}">${v.label}</option>`).join("")}
    </select>
    <textarea id="new-text" rows="2" placeholder="Did you…?" style="width:100%;background:#27272a;border:none;border-radius:8px;padding:10px;color:#e4e4e7;font-size:13px;font-family:Georgia,serif;resize:none;margin-bottom:10px"></textarea>
    <button id="add-btn" style="width:100%;padding:10px;border-radius:8px;border:none;background:#27272a;color:#52525b;font-weight:700;font-size:13px;cursor:default;font-family:Georgia,serif">Add Question</button>
  </div>`;

  el.innerHTML = html;

  // Event delegation for edit/save/cancel/delete
  el.addEventListener("click", async (e) => {
    const target = e.target.closest("[data-action]");
    if (!target) return;
    const action = target.dataset.action;
    const id = target.dataset.id;

    if (action==="edit") { editingId=id; renderSettings(); }
    if (action==="cancel") { editingId=null; renderSettings(); }
    if (action==="save") {
      const val = document.getElementById("edit-"+id).value.trim();
      if (!val) return;
      questions = questions.map(q => q.id===id ? {...q, text:val} : q);
      editingId=null;
      await saveQuestions();
      renderSettings();
    }
    if (action==="delete") {
      questions = questions.filter(q => q.id!==id);
      editingId=null;
      await saveQuestions();
      renderSettings();
    }
  });

  el.querySelector("#new-text").addEventListener("input", e => {
    const btn = el.querySelector("#add-btn");
    const has = e.target.value.trim();
    btn.style.background = has ? "#e4e4e7" : "#27272a";
    btn.style.color      = has ? "#09090b"  : "#52525b";
    btn.style.cursor     = has ? "pointer"  : "default";
  });

  el.querySelector("#add-btn").addEventListener("click", async () => {
    const text = el.querySelector("#new-text").value.trim();
    const cat  = el.querySelector("#new-cat").value;
    if (!text) return;
    const newQ = { id:"q"+Date.now(), category:cat, emoji:CAT_EMOJIS[cat], text };
    questions = [...questions, newQ];
    await saveQuestions();
    renderSettings();
  });
}
</script>
</body>
</html>
