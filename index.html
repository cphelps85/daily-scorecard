<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Scorecard" />
  <meta name="theme-color" content="#09090b" />
  <title>Daily Scorecard</title>
  <style>
    * { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
    body { background:#09090b; color:#e4e4e7; font-family:Georgia,serif; min-height:100vh; padding-bottom:100px; padding-top:env(safe-area-inset-top); }
    #dev-banner { position:fixed; top:0; left:0; right:0; z-index:9999; background:#e65c00; color:#fff; text-align:center; font-weight:700; font-size:0.85rem; padding:0.4rem 1rem; letter-spacing:0.03em; }
    #app { max-width:480px; margin:0 auto; }

    .header { padding:20px 20px 12px; border-bottom:1px solid #27272a; }
    .header-top { display:flex; justify-content:space-between; align-items:center; }
    .header-title { font-size:22px; font-weight:700; letter-spacing:-0.5px; }
    .header-date  { font-size:12px; color:#71717a; margin-top:2px; }

    .sobriety-banner { margin:16px 16px 0; background:linear-gradient(135deg,#14532d,#166534); border:1px solid #4ade8044; border-radius:16px; padding:16px 20px; display:flex; align-items:center; gap:14px; }
    .sobriety-count { font-size:42px; font-weight:700; color:#4ade80; line-height:1; }
    .sobriety-label { font-size:13px; color:#86efac; font-weight:600; }
    .sobriety-sub   { font-size:11px; color:#4ade8099; margin-top:3px; }

    .nav { display:flex; border-bottom:1px solid #27272a; margin-top:16px; }
    .nav-btn { flex:1; padding:11px 0; background:none; border:none; color:#52525b; border-bottom:2px solid transparent; cursor:pointer; font-size:12px; transition:color 0.2s; font-family:Georgia,serif; }
    .nav-btn.active { color:#e4e4e7; border-bottom:2px solid #e4e4e7; }

    .view { display:none; padding:16px; }
    .view.active { display:block; }

    .section-head { font-size:11px; font-weight:700; letter-spacing:2px; text-transform:uppercase; color:#52525b; margin:20px 0 10px; padding-left:2px; }
    .section-head:first-child { margin-top:4px; }

    .card { background:#18181b; border:1px solid #27272a; border-radius:12px; padding:14px 16px; margin-bottom:8px; }
    .card-title { font-size:13px; font-weight:600; margin-bottom:10px; display:flex; align-items:center; gap:8px; }

    .scale-row { display:flex; gap:8px; }
    .scale-btn { flex:1; padding:9px 4px; border-radius:8px; border:none; background:#27272a; color:#71717a; font-size:12px; font-weight:700; cursor:pointer; transition:all 0.15s; font-family:Georgia,serif; }
    .scale-btn.good      { background:#14532d; color:#4ade80; }
    .scale-btn.okay      { background:#422006; color:#fbbf24; }
    .scale-btn.struggled { background:#450a0a; color:#f87171; }

    .trigger-row { display:flex; flex-wrap:wrap; gap:6px; margin-top:10px; }
    .trigger-label { font-size:11px; color:#71717a; width:100%; margin-bottom:2px; }
    .trigger-chip { padding:5px 10px; border-radius:99px; border:1px solid #3f3f46; background:#27272a; color:#a1a1aa; font-size:11px; cursor:pointer; font-family:Georgia,serif; transition:all 0.15s; }
    .trigger-chip.active { background:#450a0a; border-color:#f8717188; color:#f87171; }

    .yn-row { display:flex; gap:8px; }
    .yn-btn { flex:1; padding:9px; border-radius:8px; border:none; background:#27272a; color:#71717a; font-weight:700; font-size:13px; cursor:pointer; transition:all 0.15s; font-family:Georgia,serif; }
    .yn-btn.yes-active { background:#14532d; color:#4ade80; }
    .yn-btn.no-active  { background:#450a0a; color:#f87171; }

    .weight-row { display:flex; gap:8px; margin-top:10px; }
    .weight-btn { flex:1; padding:9px; border-radius:8px; border:none; background:#27272a; color:#71717a; font-weight:700; font-size:13px; cursor:pointer; transition:all 0.15s; font-family:Georgia,serif; }
    .weight-btn.up-active   { background:#450a0a; color:#f87171; }
    .weight-btn.same-active { background:#1c1917; color:#a8a29e; border:1px solid #44403c; }
    .weight-btn.down-active { background:#14532d; color:#4ade80; }

    .caff-row { display:flex; align-items:center; gap:12px; }
    .caff-count { font-size:28px; font-weight:700; min-width:32px; text-align:center; }
    .caff-count.over { color:#f87171; }
    .caff-count.ok   { color:#4ade80; }
    .caff-btn { width:36px; height:36px; border-radius:8px; border:none; background:#27272a; color:#e4e4e7; font-size:18px; font-weight:700; cursor:pointer; font-family:Georgia,serif; display:flex; align-items:center; justify-content:center; }
    .caff-btn:disabled { opacity:0.3; cursor:default; }

    /* Movement chips */
    .move-chips { display:flex; gap:8px; flex-wrap:wrap; }
    .move-chip { padding:8px 12px; border-radius:10px; border:1px solid #27272a; background:#18181b; color:#71717a; font-size:13px; cursor:pointer; font-family:Georgia,serif; transition:all 0.15s; display:flex; flex-direction:column; align-items:center; gap:2px; min-width:52px; }
    .move-chip .chip-icon { font-size:20px; }
    .move-chip .chip-label { font-size:9px; letter-spacing:0.5px; text-transform:uppercase; }
    .move-chip.active { background:#172554; border-color:#60a5fa88; color:#60a5fa; }

    /* Running strip */
    .run-week { display:flex; gap:6px; margin-bottom:12px; }
    .run-day { flex:1; text-align:center; border-radius:10px; padding:8px 4px; border:1px solid #27272a; background:#18181b; cursor:pointer; transition:all 0.15s; }
    .run-day .day-label { font-size:10px; color:#52525b; margin-bottom:4px; }
    .run-day .day-dot   { font-size:18px; line-height:1; }
    .run-day.target    { border-color:#60a5fa44; background:#172554; }
    .run-day.target .day-label { color:#93c5fd; }
    .run-day.completed { border-color:#4ade8044; background:#14532d; }
    .run-day.completed .day-label { color:#86efac; }
    .run-day.today-marker { border-color:#e4e4e744; }

    /* Reflection */
    .reflect-input { width:100%; background:#27272a; border:none; border-radius:8px; padding:10px; color:#e4e4e7; font-size:13px; font-family:Georgia,serif; resize:none; margin-top:8px; line-height:1.5; }
    .reflect-input::placeholder { color:#52525b; }

    /* Submit */
    .submit-btn { width:100%; padding:16px; border-radius:12px; border:none; font-weight:700; font-size:15px; transition:all 0.2s; margin-top:16px; font-family:Georgia,serif; }
    .submit-btn.ready   { background:#e4e4e7; color:#09090b; cursor:pointer; }
    .submit-btn.done    { background:#14532d; color:#4ade80; cursor:default; }
    .submit-btn.waiting { background:#27272a; color:#52525b; cursor:default; }

    /* Snack */
    .add-snack-btn { width:100%; padding:10px; border-radius:10px; border:1px dashed #3f3f46; background:transparent; color:#52525b; font-size:12px; font-weight:700; cursor:pointer; font-family:Georgia,serif; margin-bottom:8px; transition:all 0.15s; }
    .snack-remove  { background:none; border:none; color:#52525b; font-size:16px; cursor:pointer; padding:0 4px; line-height:1; margin-left:auto; }

    /* Mood */
    .mood-row { display:flex; gap:6px; }
    .mood-btn { flex:1; padding:10px 4px; border-radius:8px; border:1px solid #27272a; background:#18181b; font-size:20px; cursor:pointer; text-align:center; transition:all 0.15s; }
    .mood-btn.active { border-color:#a78bfa88; background:#2e1065; }

    /* History grid */
    .range-tabs { display:flex; gap:6px; margin-bottom:16px; }
    .range-tab { flex:1; padding:8px; border-radius:8px; border:1px solid #27272a; background:#18181b; color:#71717a; font-size:12px; font-weight:700; cursor:pointer; text-align:center; font-family:Georgia,serif; transition:all 0.15s; }
    .range-tab.active { background:#27272a; color:#e4e4e7; border-color:#3f3f46; }

    .habit-grid { width:100%; border-collapse:collapse; margin-bottom:20px; }
    .habit-grid th { font-size:10px; color:#52525b; font-weight:700; padding:4px 2px; text-align:center; }
    .habit-grid th.habit-name { text-align:left; padding-left:4px; width:90px; }
    .habit-grid td { padding:3px 2px; text-align:center; font-size:14px; }
    .habit-grid td.habit-name { font-size:11px; color:#a1a1aa; text-align:left; padding-left:4px; }
    .habit-grid tr:hover td { background:#18181b; border-radius:4px; }

    .week-strip { display:flex; gap:6px; margin-bottom:16px; }
    .week-day { flex:1; text-align:center; border-radius:10px; padding:10px 4px; border:1px solid #27272a; background:#18181b; cursor:pointer; transition:all 0.15s; }
    .week-day:hover { border-color:#3f3f46; }
    .week-day .wd-label { font-size:10px; color:#71717a; margin-bottom:4px; }
    .week-day .wd-dot   { font-size:15px; }
    .week-day .wd-pct   { font-size:10px; font-weight:700; margin-top:3px; }
    .week-day.today-ring { border-color:#e4e4e744; }

    .hist-card { background:#18181b; border:1px solid #27272a; border-radius:12px; padding:14px 16px; margin-bottom:10px; display:flex; align-items:center; gap:14px; cursor:pointer; transition:all 0.15s; }
    .hist-card:hover { border-color:#3f3f46; }
    .hist-icon { width:44px; height:44px; border-radius:10px; flex-shrink:0; display:flex; align-items:center; justify-content:center; font-size:20px; }

    .trigger-bar-row { display:flex; align-items:center; gap:10px; margin-bottom:8px; }
    .trigger-bar-label { font-size:12px; color:#a1a1aa; width:100px; flex-shrink:0; }
    .trigger-bar-track { flex:1; height:8px; background:#27272a; border-radius:99px; overflow:hidden; }
    .trigger-bar-fill  { height:100%; background:#f87171; border-radius:99px; }
    .trigger-bar-count { font-size:11px; color:#71717a; width:24px; text-align:right; }

    .milestone-row  { display:flex; gap:10px; margin-bottom:8px; }
    .milestone-card { flex:1; background:#18181b; border:1px solid #27272a; border-radius:12px; padding:14px 12px; text-align:center; }
    .milestone-val  { font-size:26px; font-weight:700; }
    .milestone-label{ font-size:11px; color:#71717a; margin-top:3px; }

    /* Day detail modal */
    .modal-overlay { position:fixed; inset:0; background:#000000cc; z-index:1000; display:flex; align-items:flex-end; justify-content:center; }
    .modal-sheet { background:#18181b; border-radius:20px 20px 0 0; width:100%; max-width:480px; max-height:85vh; overflow-y:auto; padding:20px 20px 40px; }
    .modal-handle { width:40px; height:4px; background:#3f3f46; border-radius:99px; margin:0 auto 16px; }
    .modal-title  { font-size:16px; font-weight:700; margin-bottom:16px; }
    .detail-row   { display:flex; justify-content:space-between; align-items:center; padding:8px 0; border-bottom:1px solid #27272a; font-size:13px; }
    .detail-row:last-child { border-bottom:none; }
    .detail-label { color:#71717a; }
    .detail-val   { font-weight:600; }
    .modal-close  { width:100%; padding:12px; border-radius:10px; border:none; background:#27272a; color:#a1a1aa; font-size:13px; font-weight:700; cursor:pointer; font-family:Georgia,serif; margin-top:16px; }

    /* Claude tab */
    .insight-card { background:#1c1917; border:1px solid #44403c; border-radius:12px; padding:14px 16px; margin-bottom:8px; font-size:13px; line-height:1.6; color:#d6d3d1; }
    .insight-card .insight-icon { font-size:16px; margin-right:6px; }
    .api-key-wrap { background:#18181b; border:1px solid #27272a; border-radius:12px; padding:16px; margin-bottom:16px; }
    .api-key-input { width:100%; background:#27272a; border:none; border-radius:8px; padding:10px 12px; color:#e4e4e7; font-size:13px; font-family:monospace; margin:10px 0; }
    .api-key-input::placeholder { color:#52525b; }
    .chat-messages { min-height:120px; margin-bottom:12px; }
    .chat-msg { margin-bottom:12px; display:flex; gap:10px; }
    .chat-msg.user { flex-direction:row-reverse; }
    .chat-bubble { max-width:82%; padding:10px 14px; border-radius:14px; font-size:13px; line-height:1.55; }
    .chat-msg.assistant .chat-bubble { background:#27272a; color:#e4e4e7; border-radius:14px 14px 14px 4px; }
    .chat-msg.user      .chat-bubble { background:#172554; color:#93c5fd; border-radius:14px 14px 4px 14px; }
    .chat-input-row { display:flex; gap:8px; }
    .chat-input { flex:1; background:#27272a; border:none; border-radius:10px; padding:10px 12px; color:#e4e4e7; font-size:13px; font-family:Georgia,serif; resize:none; }
    .chat-input::placeholder { color:#52525b; }
    .chat-send { padding:10px 16px; border-radius:10px; border:none; background:#172554; color:#60a5fa; font-size:13px; font-weight:700; cursor:pointer; font-family:Georgia,serif; }
    .chat-send:disabled { opacity:0.4; cursor:default; }

    /* Settings */
    .setting-row { background:#18181b; border:1px solid #27272a; border-radius:12px; padding:14px 16px; margin-bottom:8px; display:flex; align-items:center; justify-content:space-between; }
    .setting-label { font-size:13px; }
    .setting-sub   { font-size:11px; color:#71717a; margin-top:2px; }
    .run-day-toggle { display:flex; gap:6px; flex-wrap:wrap; margin-top:10px; }
    .rdt-btn { padding:6px 12px; border-radius:8px; border:1px solid #3f3f46; background:#27272a; color:#71717a; font-size:12px; cursor:pointer; font-family:Georgia,serif; transition:all 0.15s; }
    .rdt-btn.active { background:#172554; border-color:#60a5fa88; color:#60a5fa; }

    .empty { text-align:center; color:#52525b; padding:40px 0; font-size:13px; }
    .pill-btn { padding:8px 16px; border-radius:8px; border:none; font-size:12px; font-weight:700; cursor:pointer; font-family:Georgia,serif; transition:all 0.15s; }
  </style>
</head>
<body>
<div id="app">
  <div style="min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#71717a;gap:16px">
    <div style="font-size:32px">✦</div><div style="font-size:14px">Loading…</div>
  </div>
</div>

<script type="module">
import { initializeApp }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, GoogleAuthProvider, signInWithPopup, signInAnonymously, signOut, onAuthStateChanged }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, doc, getDoc, setDoc, collection, getDocs }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey:            "AIzaSyAu5PZP0rRuTsWlk-5zF0GOAMbUGjYBYQ0",
  authDomain:        "daily-scorecard-62031.firebaseapp.com",
  projectId:         "daily-scorecard-62031",
  storageBucket:     "daily-scorecard-62031.firebasestorage.app",
  messagingSenderId: "647221313494",
  appId:             "1:647221313494:web:f4755a965e75b044a46e77"
};

const IS_DEV    = window.location.protocol === 'file:';
const DB_PREFIX = IS_DEV ? 'dev_' : '';

const fbApp = initializeApp(firebaseConfig);
const auth  = getAuth(fbApp);
const db    = getFirestore(fbApp);

if (IS_DEV) {
  const b = document.createElement('div');
  b.id = 'dev-banner';
  b.textContent = '⚠️ DEV MODE — test data only';
  document.body.prepend(b);
}

// ── Constants ─────────────────────────────────────────────────────────
const SOBRIETY_START   = new Date('2025-11-05T00:00:00');
const TRIGGERS         = ['Stressed','Tired','Bored','Social','Just wanted it','Other'];
const MOODS            = ['😔','😕','😐','🙂','😄'];
const MOOD_LABELS      = ['Rough','Low','Okay','Good','Great'];
const DEFAULT_RUN_DAYS = [3, 5, 0];
const DAY_NAMES        = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const MEAL_SLOTS       = ['Breakfast','Lunch','Dinner'];
const MOVEMENTS        = [
  { key:'strength', icon:'💪', label:'Strength' },
  { key:'walk',     icon:'🚶', label:'Walk'     },
  { key:'bike',     icon:'🚴', label:'Bike'     },
  { key:'hike',     icon:'🥾', label:'Hike'     },
  { key:'other',    icon:'✨', label:'Other'    },
];

// ── State ─────────────────────────────────────────────────────────────
let user        = null;
let currentView = 'today';
let today       = {};
let history     = {};
let settings    = {};
let chatMessages = JSON.parse(localStorage.getItem('sc_chat') || '[]');
let activeDate  = null; // the date currently being filled in on the Today tab

// ── Firestore ─────────────────────────────────────────────────────────
const uDoc = (...p) => doc(db, DB_PREFIX + 'users', user.uid, ...p);
const uCol = (n)    => collection(db, DB_PREFIX + 'users', user.uid, n);

function todayKey() { return new Date().toISOString().slice(0,10); }
function dateKey(d) { return d.toISOString().slice(0,10); }
function weekKeys() {
  const keys = [];
  for (let i=6; i>=0; i--) { const d=new Date(); d.setDate(d.getDate()-i); keys.push(dateKey(d)); }
  return keys;
}
function getDayLabel(s) { return DAY_NAMES[new Date(s+'T12:00:00').getDay()]; }
function sobrietyDays() { return Math.floor((new Date()-SOBRIETY_START)/86400000); }
function scoreColor(pct) {
  if (pct>=0.75) return {bg:'#14532d',text:'#4ade80',label:'Great Day', emoji:'🌟'};
  if (pct>=0.5)  return {bg:'#713f12',text:'#fbbf24',label:'Decent Day',emoji:'👍'};
  return               {bg:'#450a0a',text:'#f87171',label:'Rough Day', emoji:'💪'};
}

function activeDateKey() { return activeDate || todayKey(); }

function yesterdayKey() { const d=new Date(); d.setDate(d.getDate()-1); return dateKey(d); }

function initActiveDate() {
  const stored = sessionStorage.getItem('sc_active_date');
  const todayStr = todayKey();
  const yesterStr = yesterdayKey();
  if (stored && (stored === todayStr || stored === yesterStr)) {
    activeDate = stored;
  } else {
    activeDate = todayStr;
    sessionStorage.setItem('sc_active_date', activeDate);
  }
}

function freshToday() {
  return {
    mood:null, dayPlanned:null, caffeine:0,
    meals:{ Breakfast:{rating:null,trigger:null}, Lunch:{rating:null,trigger:null}, Dinner:{rating:null,trigger:null} },
    snacks:[], movements:[], ran:null,
    executedPlan:null, homeOrg:null,
    weighed:null, weightDir:null,
    wentWell:'', couldImprove:'',
    submitted:false,
  };
}

function filledItems() {
  let n=0;
  if (today.mood!==null)         n++;
  if (today.dayPlanned!==null)   n++;
  if (today.caffeine!==null)     n++;
  MEAL_SLOTS.forEach(m=>{ if(today.meals[m].rating!==null) n++; });
  if (today.homeOrg!==null)      n++;
  if (today.weighed!==null)      n++;
  if (today.executedPlan!==null) n++;
  return n;
}
function totalItems() { return 3 + MEAL_SLOTS.length + 3; } // mood,planned,caff + 3meals + homeOrg,weighed,executedPlan

// ── Load / Save ───────────────────────────────────────────────────────
async function loadUserData() {
  const sSnap = await getDoc(uDoc('settings','prefs'));
  settings = sSnap.exists() ? sSnap.data() : {runDays:DEFAULT_RUN_DAYS};
  if (!settings.runDays) settings.runDays = DEFAULT_RUN_DAYS;

  const hSnap = await getDocs(uCol('checkins'));
  history = {};
  hSnap.forEach(d=>{ history[d.id]=d.data(); });

  const tSnap = await getDoc(uDoc('checkins',activeDateKey()));
  if (tSnap.exists()) {
    today = {...freshToday(),...tSnap.data()};
    if (!today.meals) today.meals = freshToday().meals;
    MEAL_SLOTS.forEach(m=>{ if(!today.meals[m]) today.meals[m]={rating:null,trigger:null}; });
    if (!today.snacks)    today.snacks=[];
    if (!today.movements) today.movements=[];
  } else {
    today = freshToday();
  }
}

async function saveToday() {
  const filled=filledItems(), total=totalItems(), pct=total>0?filled/total:0;
  const data={...today,pct,filled,total,date:activeDateKey()};
  await setDoc(uDoc('checkins',activeDateKey()),data);
  history[activeDateKey()]=data;
}

async function saveDayRun(k, val) {
  const existing = history[k] ? {...history[k]} : {date:k,meals:{},snacks:[],movements:[],pct:0,filled:0,total:totalItems()};
  existing.ran = val;
  await setDoc(uDoc('checkins',k), existing);
  history[k] = existing;
}

async function saveSettings() { await setDoc(uDoc('settings','prefs'),settings); }

// ── Auth ──────────────────────────────────────────────────────────────
onAuthStateChanged(auth, async u => {
  user = u;
  if (u) {
    showLoading('Loading your scorecard…');
    initActiveDate();
    await loadUserData();
    renderShell();
    render();
  } else if (IS_DEV) {
    await signInAnonymously(auth);
  } else {
    renderLogin();
  }
});

function showLoading(msg) {
  document.getElementById('app').innerHTML=`<div style="min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#71717a;gap:16px"><div style="font-size:32px">✦</div><div style="font-size:14px">${msg}</div></div>`;
}

function renderLogin() {
  document.getElementById('app').innerHTML=`
    <div style="min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px;text-align:center">
      <div style="font-size:48px;margin-bottom:16px">✦</div>
      <div style="font-size:26px;font-weight:700;letter-spacing:-0.5px;margin-bottom:8px">Daily Scorecard</div>
      <div style="font-size:14px;color:#71717a;margin-bottom:12px;line-height:1.6">Your daily wins, habits &amp; goals.</div>

    <div class="scale-row">
      <button class="scale-btn ${rating==='good'?'good':''}" data-action="mealRating" data-meal="${meal}" data-val="good">🟢 Good</button>
      <button class="scale-btn ${rating==='okay'?'okay':''}" data-action="mealRating" data-meal="${meal}" data-val="okay">🟡 Okay</button>
      <button class="scale-btn ${rating==='struggled'?'struggled':''}" data-action="mealRating" data-meal="${meal}" data-val="struggled">🔴 Struggled</button>

function renderRunCard() {
  const runsThisWeek=weekKeys().filter(k=>history[k]&&history[k].ran===true).length;
  const targetRuns=settings.runDays.length;
  const dayHtml=weekKeys().map(k=>{
    const dow=new Date(k+'T12:00:00').getDay();
    const isTarget=settings.runDays.includes(dow);
    const completed=history[k]&&history[k].ran===true;
    const isToday=k===todayKey();
    let cls='run-day';
    if(completed) cls+=' completed';
    else if(isTarget) cls+=' target';
    if(isToday) cls+=' today-marker';
    return `<div class="${cls}" data-action="toggleRunDay" data-key="${k}">
      <div class="day-label">${getDayLabel(k)}</div>
      <div class="day-dot">${completed?'✓':isTarget?'🏃':'·'}</div>
    </div>`;
  }).join('');
  return `<div class="card"><div class="card-title">🏃 Running <span style="font-size:11px;color:#60a5fa;margin-left:auto">${runsThisWeek}/${targetRuns} this week</span></div>
    <div style="font-size:11px;color:#52525b;margin-bottom:8px">Tap any day to log or remove a run</div>
    <div class="run-week">${dayHtml}</div>
  </div>`;
}

function attachTodayEvents(el) {
  el.addEventListener('click', async e=>{
    const btn=e.target.closest('[data-action]');
    if(!btn) return;
    const action=btn.dataset.action;
    if      (action==='mood')         { today.mood=parseInt(btn.dataset.val); }
    else if (action==='dayPlanned')   { today.dayPlanned=btn.dataset.val==='true'; }
    else if (action==='caffInc')      { today.caffeine=(today.caffeine||0)+1; }
    else if (action==='caffDec')      { today.caffeine=Math.max(0,(today.caffeine||0)-1); }
    else if (action==='mealRating')   { today.meals[btn.dataset.meal].rating=btn.dataset.val; today.meals[btn.dataset.meal].trigger=null; }
    else if (action==='mealTrigger')  { today.meals[btn.dataset.meal].trigger=btn.dataset.val; }
    else if (action==='snackRating')  { const i=parseInt(btn.dataset.idx); today.snacks[i].rating=btn.dataset.val; today.snacks[i].trigger=null; }
    else if (action==='snackTrigger') { today.snacks[parseInt(btn.dataset.idx)].trigger=btn.dataset.val; }
    else if (action==='addSnack')     { today.snacks.push({rating:null,trigger:null}); }
    else if (action==='removeSnack')  { today.snacks.splice(parseInt(btn.dataset.idx),1); }
    else if (action==='toggleMove')   {
      const k=btn.dataset.key;
      const idx=today.movements.indexOf(k);
      if(idx>=0) today.movements.splice(idx,1); else today.movements.push(k);
    }
    else if (action==='toggleRunDay') {
      const k=btn.dataset.key;
      if(k===activeDateKey()) { today.ran=!today.ran; await saveToday(); }
      else { await saveDayRun(k, !(history[k]&&history[k].ran===true)); }
      renderToday(); return;
    }
    else if (action==='useYesterday') {
      activeDate = yesterdayKey();
      sessionStorage.setItem('sc_active_date', activeDate);
      const snap = await getDoc(uDoc('checkins', activeDate));
      today = snap.exists() ? {...freshToday(),...snap.data()} : freshToday();
      if(!today.meals) today.meals=freshToday().meals;
      MEAL_SLOTS.forEach(m=>{ if(!today.meals[m]) today.meals[m]={rating:null,trigger:null}; });
      if(!today.snacks) today.snacks=[];
      if(!today.movements) today.movements=[];
      renderToday(); return;
    }
    else if (action==='confirmToday') {
      sessionStorage.setItem('sc_date_confirmed_'+todayKey(), '1');
      renderToday(); return;
    }
    else if (action==='weighed')      { today.weighed=btn.dataset.val==='true'; if(!today.weighed) today.weightDir=null; }
    else if (action==='weightDir')    { today.weightDir=btn.dataset.val; }
    else if (action==='executedPlan') { today.executedPlan=btn.dataset.val==='true'; }
    else if (action==='homeOrg')      { today.homeOrg=btn.dataset.val==='true'; }
    await saveToday(); renderToday();
  });

  // Reflection textareas (debounced save)
  let reflectTimer;
  el.querySelectorAll('textarea[data-reflect]').forEach(ta=>{
    ta.addEventListener('input', e=>{
      today[ta.dataset.reflect]=ta.value;
      clearTimeout(reflectTimer);
      reflectTimer=setTimeout(saveToday, 800);
    });
  });

  const submitBtn=el.querySelector('#submit-btn');
  if(submitBtn&&!today.submitted) {
    submitBtn.addEventListener('click', async ()=>{ today.submitted=true; await saveToday(); renderToday(); });
  }
  const unlockTodayBtn=el.querySelector('#unlock-today-btn');
  if(unlockTodayBtn) {
    unlockTodayBtn.addEventListener('click', async ()=>{
      if(confirm('Unlock this day to make changes? Your data will be preserved.')) {
        today.submitted=false; await saveToday(); renderToday();
      }
    });
  }
  const resetBtn=el.querySelector('#reset-today-btn');
  if(resetBtn) {
    resetBtn.addEventListener('click', async ()=>{ if(confirm("Reset all of today's data?")){ today=freshToday(); await saveToday(); renderToday(); } });
  }
}

// ── DATA MANAGEMENT ───────────────────────────────────────────────────
async function unlockDay(k) {
  const snap = await getDoc(uDoc('checkins', k));
  if(!snap.exists()) return;
  const data = {...snap.data(), submitted: false};
  await setDoc(uDoc('checkins', k), data);
  history[k] = data;
  if(k === activeDateKey()) { today.submitted=false; }
  if(currentView==='today') renderToday();
  if(currentView==='history') renderHistory();
}

async function copyDayData(fromKey, toKey) {
  const fromSnap = await getDoc(uDoc('checkins', fromKey));
  if(!fromSnap.exists()) { alert('No data found for '+fromKey); return; }
  const fromData = fromSnap.data();

  // Write to target date (unlocked so she can review/edit)
  const toData = {...fromData, date: toKey, submitted: false};
  await setDoc(uDoc('checkins', toKey), toData);
  history[toKey] = toData;

  // Reset source date
  const resetData = {...freshToday(), date: fromKey, pct:0, filled:0, total:totalItems()};
  await setDoc(uDoc('checkins', fromKey), resetData);
  history[fromKey] = resetData;

  // Switch activeDate to toKey so the Today tab shows the copied (now unlocked) entry
  activeDate = toKey;
  sessionStorage.setItem('sc_active_date', activeDate);
  today = {...freshToday(), ...toData};
  if(!today.meals) today.meals=freshToday().meals;
  MEAL_SLOTS.forEach(m=>{ if(!today.meals[m]) today.meals[m]={rating:null,trigger:null}; });
  if(!today.snacks) today.snacks=[];
  if(!today.movements) today.movements=[];

  // Navigate to Today tab
  currentView='today';
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  document.querySelector('.nav-btn[data-view="today"]')?.classList.add('active');
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.getElementById('view-today')?.classList.add('active');
  renderToday();
}

function renderHistory() {
  const old=document.getElementById('view-history');

  // Sobriety

  const runStreak=calcStreak(k=>history[k]&&history[k].ran===true);
  const weighStreak=calcStreak(k=>history[k]&&history[k].weighed===true);

  html+=`<div class="milestone-row">

  // Weight trend
  const wt=calcWeightTrend();
  if(wt.total>0) {
    html+=`<div class="card" style="margin-bottom:8px"><div class="card-title">⚖️ Weight trend — last 30 days</div>
      <div style="display:flex;gap:16px;justify-content:center;padding:4px 0">
        <div style="text-align:center"><div style="font-size:24px;font-weight:700;color:#4ade80">${wt.down}</div><div style="font-size:11px;color:#71717a">↓ down</div></div>
        <div style="text-align:center"><div style="font-size:24px;font-weight:700;color:#a8a29e">${wt.same}</div><div style="font-size:11px;color:#71717a">→ same</div></div>
        <div style="text-align:center"><div style="font-size:24px;font-weight:700;color:#f87171">${wt.up}</div><div style="font-size:11px;color:#71717a">↑ up</div></div>
      </div>
    </div>`;
  }

  // Trigger chart
  const triggers=calcTriggerCounts();
  if(Object.keys(triggers).length>0) {
    html+=`<div class="section-head">Eating Pattern Triggers</div><div class="card">
      <div style="font-size:12px;color:#71717a;margin-bottom:14px">When you rated a meal or snack Okay / Struggled:</div>`;
    const max=Math.max(...Object.values(triggers));
    Object.entries(triggers).sort((a,b)=>b[1]-a[1]).forEach(([t,c])=>{
      html+=`<div class="trigger-bar-row"><div class="trigger-bar-label">${t}</div><div class="trigger-bar-track"><div class="trigger-bar-fill" style="width:${max>0?Math.round(c/max*100):0}%"></div></div><div class="trigger-bar-count">${c}</div></div>`;
    });
    html+=`</div>`;
  }

  // Range selector + habit grid
  html+=`<div class="section-head">Habit Log</div>`;
  html+=`<div class="range-tabs">
    <button class="range-tab ${histRange===7?'active':''}" data-action="setRange" data-val="7">7 Days</button>
    <button class="range-tab ${histRange===30?'active':''}" data-action="setRange" data-val="30">30 Days</button>
  </div>`;
  html+=renderHabitGrid();

  // Full log
  html+=`<div class="section-head">Full Log</div>`;
  const keys=Object.keys(history).sort().reverse();
  if(!keys.length) { html+=`<div class="empty">No history yet — complete your first check-in!</div>`; }
  else {
    keys.forEach(k=>{
      const d=history[k]; if(!d) return;
      const col=scoreColor(d.pct||0);
      const dateStr=new Date(k+'T12:00:00').toLocaleDateString('en-US',{weekday:'long',month:'short',day:'numeric'});
      const badges=[d.ran?'🏃':'',d.weighed?'⚖️':''].filter(Boolean).join(' ');
      html+=`<div class="hist-card" data-action="showDay" data-key="${k}">
        <div class="hist-icon" style="background:${col.bg};border:1px solid ${col.text}44">${col.emoji}</div>
        <div style="flex:1"><div style="font-size:13px;font-weight:600">${dateStr}</div><div style="font-size:11px;color:#71717a;margin-top:2px">${d.filled||0} of ${d.total||0} habits ${badges}</div></div>
        <div style="font-size:16px;font-weight:700;color:${col.text}">${Math.round((d.pct||0)*100)}%</div>
      </div>`;
    });
  }

  el.innerHTML=html;

  el.addEventListener('click', e=>{
    const btn=e.target.closest('[data-action]');
    if(!btn) return;
    if(btn.dataset.action==='setRange') { histRange=parseInt(btn.dataset.val); renderHistory(); }
    if(btn.dataset.action==='showDay')  { showDayDetail(btn.dataset.key); }
  });
}

function renderHabitGrid() {
  const HABITS = [
    {key:'mood',      label:'🧠 Mood',     fn:d=>d.mood!==null?MOODS[d.mood]:'–'},
    {key:'planned',   label:'📅 Planned',  fn:d=>d.dayPlanned===true?'✓':d.dayPlanned===false?'✗':'–'},
    {key:'caff',      label:'☕ Caffeine',  fn:d=>d.caffeine!==undefined?(d.caffeine<=1?'✓':'⚠'):'–'},
    {key:'breakfast', label:'🍳 Breakfast', fn:d=>ratingDot(d.meals?.Breakfast?.rating)},
    {key:'lunch',     label:'🥗 Lunch',     fn:d=>ratingDot(d.meals?.Lunch?.rating)},
    {key:'dinner',    label:'🍽️ Dinner',    fn:d=>ratingDot(d.meals?.Dinner?.rating)},
    {key:'ran',       label:'🏃 Run',       fn:d=>d.ran===true?'✓':d.ran===false?'–':'–'},
    {key:'weighed',   label:'⚖️ Weighed',   fn:d=>d.weighed===true?'✓':d.weighed===false?'–':'–'},
    {key:'homeOrg',   label:'🏠 Home',      fn:d=>d.homeOrg===true?'✓':d.homeOrg===false?'✗':'–'},
    {key:'plan',      label:'✅ Executed',  fn:d=>d.executedPlan===true?'✓':d.executedPlan===false?'✗':'–'},
  ];

  const days=[];
  for(let i=histRange-1;i>=0;i--) { const d=new Date(); d.setDate(d.getDate()-i); days.push(dateKey(d)); }

  // For 30 days, group into weeks
  if(histRange===30) {
    let html=`<div style="overflow-x:auto"><table class="habit-grid"><thead><tr><th class="habit-name">Habit</th>`;
    const weeks=[];
    for(let i=0;i<days.length;i+=7) weeks.push(days.slice(i,i+7));
    weeks.forEach((w,i)=>{ html+=`<th>Wk ${i+1}</th>`; });
    html+=`</tr></thead><tbody>`;
    HABITS.forEach(h=>{
      html+=`<tr><td class="habit-name">${h.label}</td>`;
      weeks.forEach(w=>{
        const vals=w.map(k=>history[k]).filter(Boolean);
        if(!vals.length){ html+=`<td style="color:#3f3f46">–</td>`; return; }
        const positives=vals.filter(d=>{
          const v=h.fn(d);
          return v==='✓'||v==='🟢'||['😄','🙂','😐'].includes(v);
        }).length;
        const pct=Math.round(positives/vals.length*100);
        const color=pct>=75?'#4ade80':pct>=50?'#fbbf24':'#f87171';
        html+=`<td style="font-size:11px;font-weight:700;color:${color}">${pct}%</td>`;
      });
      html+=`</tr>`;
    });
    html+=`</tbody></table></div>`;
    return html;
  }

  let html=`<div style="overflow-x:auto"><table class="habit-grid"><thead><tr><th class="habit-name">Habit</th>`;
  days.forEach(k=>{ html+=`<th>${getDayLabel(k)}<br><span style="font-size:9px;color:#3f3f46">${k.slice(5)}</span></th>`; });
  html+=`</tr></thead><tbody>`;
  HABITS.forEach(h=>{
    html+=`<tr><td class="habit-name">${h.label}</td>`;
    days.forEach(k=>{ const d=history[k]; html+=`<td>${d?h.fn(d):'–'}</td>`; });
    html+=`</tr>`;
  });
  html+=`</tbody></table></div>`;
  return html;
}

function ratingDot(r) { return r==='good'?'🟢':r==='okay'?'🟡':r==='struggled'?'🔴':'–'; }

function showDayDetail(k) {
  const d=history[k]; if(!d) return;
  const dateStr=new Date(k+'T12:00:00').toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'});
  const col=scoreColor(d.pct||0);
  let rows='';
  const row=(label,val)=>`<div class="detail-row"><span class="detail-label">${label}</span><span class="detail-val">${val}</span></div>`;
  rows+=row('Mood', d.mood!==null?`${MOODS[d.mood]} ${MOOD_LABELS[d.mood]}`:'–');
  rows+=row('Day planned', d.dayPlanned===true?'✓ Yes':d.dayPlanned===false?'✗ No':'–');
  rows+=row('Executed plan', d.executedPlan===true?'✓ Yes':d.executedPlan===false?'✗ No':'–');
  rows+=row('Caffeine', d.caffeine!==undefined?`${d.caffeine} drink${d.caffeine!==1?'s':''}${d.caffeine<=1?' ✓':' ⚠️'}`:'–');
  MEAL_SLOTS.forEach(m=>{
    const meal=d.meals?.[m];
    const rating=ratingDot(meal?.rating);
    const trigger=meal?.trigger?` · ${meal.trigger}`:'';
    rows+=row(m, meal?.rating?`${rating} ${meal.rating}${trigger}`:'–');
  });
  if(d.snacks?.length) {
    d.snacks.forEach((s,i)=>{ rows+=row(`Snack ${i+1}`, s.rating?`${ratingDot(s.rating)} ${s.rating}${s.trigger?` · ${s.trigger}`:''}`: '–'); });
  }
  rows+=row('Run', d.ran===true?'✓ Yes':'–');
  if(d.movements?.length) rows+=row('Movement', d.movements.map(k=>MOVEMENTS.find(m=>m.key===k)?.icon||k).join(' '));
  rows+=row('Weighed', d.weighed===true?`✓${d.weightDir?` · ${d.weightDir}`:''}`:d.weighed===false?'✗ No':'–');
  rows+=row('Home org', d.homeOrg===true?'✓ Yes':d.homeOrg===false?'✗ No':'–');
  if(d.wentWell)     rows+=row('Went well', `"${d.wentWell}"`);
  if(d.couldImprove) rows+=row('Improve',   `"${d.couldImprove}"`);

  const overlay=document.createElement('div');
  overlay.className='modal-overlay';
  overlay.innerHTML=`<div class="modal-sheet">
    <div class="modal-handle"></div>
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:16px">
      <div class="hist-icon" style="background:${col.bg};border:1px solid ${col.text}44;width:44px;height:44px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px">${col.emoji}</div>
      <div><div class="modal-title" style="margin-bottom:2px">${dateStr}</div>
      <div style="font-size:12px;color:${col.text}">${col.label} · ${Math.round((d.pct||0)*100)}%</div></div>
    </div>
    ${rows}
    ${d.submitted?`<button class="modal-close" id="modal-unlock-btn" style="margin-top:8px;background:#27272a;color:#f87171;">🔓 Unlock Day</button>`:''}
    <button class="modal-close">Close</button>
  </div>`;
  overlay.querySelector('.modal-close').addEventListener('click',()=>overlay.remove());
  overlay.addEventListener('click',e=>{ if(e.target===overlay) overlay.remove(); });
  const unlockBtn=overlay.querySelector('#modal-unlock-btn');
  if(unlockBtn) {
    unlockBtn.addEventListener('click', async ()=>{
      if(confirm(`Unlock ${k} to make changes?`)) { await unlockDay(k); overlay.remove(); }
    });
  }
  document.body.appendChild(overlay);
}

function calcStreak(fn) {
  let streak=0; const d=new Date();
  for(let i=0;i<365;i++) { if(fn(dateKey(d))){ streak++; d.setDate(d.getDate()-1); } else break; }
  return streak;
}
function calcWeightTrend() {
  const r={up:0,down:0,same:0,total:0};
  const cutoff=new Date(); cutoff.setDate(cutoff.getDate()-30);
  Object.entries(history).forEach(([k,d])=>{ if(!d||!d.weighed||!d.weightDir) return; if(new Date(k)<cutoff) return; r[d.weightDir]=(r[d.weightDir]||0)+1; r.total++; });
  return r;
}
function calcTriggerCounts() {
  const counts={};
  Object.values(history).forEach(d=>{ if(!d) return; [...Object.values(d.meals||{}),...(d.snacks||[])].forEach(m=>{ if(m?.trigger) counts[m.trigger]=(counts[m.trigger]||0)+1; }); });
  return counts;
}

// ── CLAUDE / INSIGHTS ─────────────────────────────────────────────────
function buildInsights() {
  const insights=[];
  // Days since last journal
  const journalDays=Object.keys(history).sort().reverse();
  const lastJournal=journalDays.find(k=>history[k]?.wentWell||history[k]?.couldImprove);
  const daysSinceJournal=lastJournal?Math.floor((new Date()-new Date(lastJournal+'T12:00:00'))/86400000):null;
  if(daysSinceJournal===null||daysSinceJournal>3) insights.push({icon:'📝',text:daysSinceJournal===null?"You haven't journaled yet. Taking a moment to reflect can help you spot patterns.":`It's been ${daysSinceJournal} days since your last reflection. What's been going on?`});

  // Run completion
  const runsThisWeek=weekKeys().filter(k=>history[k]&&history[k].ran===true).length;
  if(runsThisWeek>=settings.runDays.length) insights.push({icon:'🏃',text:`You hit all ${settings.runDays.length} runs this week. That's a great week!`});
  else if(runsThisWeek===0) insights.push({icon:'🏃',text:`No runs logged yet this week. You've got time — what's getting in the way?`});

  // Top trigger
  const triggers=calcTriggerCounts();
  if(Object.keys(triggers).length>0) {
    const top=Object.entries(triggers).sort((a,b)=>b[1]-a[1])[0];
    insights.push({icon:'🍽️',text:`Your most common eating trigger is <strong>${top[0]}</strong> (${top[1]} times). Noticing that is the first step.`});
  }

  // Mood trend
  const recentMoods=weekKeys().map(k=>history[k]?.mood).filter(m=>m!==null&&m!==undefined);
  if(recentMoods.length>=3) {
    const avg=recentMoods.reduce((a,b)=>a+b,0)/recentMoods.length;
    if(avg>=3.5) insights.push({icon:'🧠',text:`Your mood has been trending positive this week. Keep doing what you're doing.`});
    else if(avg<2) insights.push({icon:'🧠',text:`Your mood has been lower this week. Be gentle with yourself — you're still showing up.`});
  }

  // Sobriety milestone
  const days=sobrietyDays();
  if(days%30===0) insights.push({icon:'🌿',text:`${days} days sober. That's a milestone worth sitting with.`});
  else if(days%7===0) insights.push({icon:'🌿',text:`${days} days sober — ${days/7} weeks strong.`});

  return insights;
}

function buildContext() {
  const days=Object.keys(history).sort().reverse().slice(0,14);
  const lines=days.map(k=>{
    const d=history[k]; if(!d) return null;
    const meals=MEAL_SLOTS.map(m=>`${m}:${d.meals?.[m]?.rating||'?'}${d.meals?.[m]?.trigger?`(${d.meals[m].trigger})`:''}`).join(',');
    const snacks=(d.snacks||[]).map(s=>`snack:${s.rating||'?'}${s.trigger?`(${s.trigger})`:''}`).join(',');
    const moves=(d.movements||[]).join(',');
    return `${k}|mood:${d.mood!==null?MOOD_LABELS[d.mood]:'?'}|planned:${d.dayPlanned??'?'}|executed:${d.executedPlan??'?'}|caff:${d.caffeine??'?'}|${meals}${snacks?`|${snacks}`:''}|ran:${d.ran??'?'}|moves:${moves||'none'}|weighed:${d.weighed??'?'}${d.weightDir?`(${d.weightDir})`:''}|home:${d.homeOrg??'?'}|wentWell:"${d.wentWell||''}"|improve:"${d.couldImprove||''}"`;
  }).filter(Boolean);
  return lines.join('\n');
}

function getSystemPrompt() {
  return `You are a warm, direct personal health coach for someone who goes by Chrissy. You have access to her daily scorecard data. Here's what you know about her goals:

- She has been sober since November 5, 2025 (${sobrietyDays()} days today) — this is her biggest win and very important to her
- She's limiting caffeine to 1 caffeinated drink per day (rest decaf)
- She runs Wed/Fri/Sun (her current target days: ${settings.runDays.map(d=>DAY_NAMES[d]).join(', ')})
- She's tracking meal quality (not food logging — just Good/Okay/Struggled) with emotional triggers
- Goal: lose weight, feel energized, improve blood work
- Also tracking mental health, home organization, and daily planning

Her last 14 days of data:
${buildContext()}

Be conversational, warm, and honest. Ask questions. Notice patterns. Celebrate specific wins. Don't be preachy or lecture her. Keep responses concise. If she hasn't journaled recently, gently ask what's been going on. Reference her actual data when relevant, not generic advice.`;
}

async function sendToClaude(userMessage) {
  const apiKey=localStorage.getItem('sc_anthropic_key');
  if(!apiKey) return null;
  chatMessages.push({role:'user',content:userMessage});
  localStorage.setItem('sc_chat',JSON.stringify(chatMessages.slice(-40)));
  try {
    const resp=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{
        'x-api-key':apiKey,
        'anthropic-version':'2023-06-01',
        'content-type':'application/json',
        'anthropic-dangerous-allow-browser':'true'
      },
      body:JSON.stringify({
        model:'claude-haiku-4-5-20251001',
        max_tokens:600,
        system:getSystemPrompt(),
        messages:chatMessages
      })
    });
    if(!resp.ok) { const err=await resp.json(); throw new Error(err.error?.message||resp.status); }
    const data=await resp.json();
    const reply=data.content[0].text;
    chatMessages.push({role:'assistant',content:reply});
    localStorage.setItem('sc_chat',JSON.stringify(chatMessages.slice(-40)));
    return reply;
  } catch(e) {
    chatMessages.pop();
    throw e;
  }
}

function renderClaude() {
  const old=document.getElementById('view-claude');
  const el=old.cloneNode(false); old.parentNode.replaceChild(el,old);
  const apiKey=localStorage.getItem('sc_anthropic_key');
  const insights=buildInsights();
  let html='';

  // Auto-insights (no API needed)
  if(insights.length>0) {
    html+=`<div class="section-head">Today's Observations</div>`;
    insights.forEach(i=>{ html+=`<div class="insight-card"><span class="insight-icon">${i.icon}</span>${i.text}</div>`; });
  }

  // Chat
  html+=`<div class="section-head">Chat with Claude</div>`;
  if(!apiKey) {
    html+=`<div class="api-key-wrap">
      <div style="font-size:13px;font-weight:600;margin-bottom:6px">Connect your Anthropic API key</div>
      <div style="font-size:12px;color:#71717a;line-height:1.6;margin-bottom:4px">Your key is stored only in this browser — never uploaded to Firebase or GitHub. It's sent directly to Anthropic's servers when you chat.</div>
      <input class="api-key-input" id="api-key-input" type="password" placeholder="sk-ant-…" autocomplete="off">
      <div style="display:flex;gap:8px">
        <button class="pill-btn" id="save-key-btn" style="background:#172554;color:#60a5fa;">Save Key</button>
        <a href="https://console.anthropic.com/settings/keys" target="_blank" style="font-size:11px;color:#52525b;align-self:center;margin-left:4px">Get a key ↗</a>
      </div>
    </div>`;
  } else {
    html+=`<div style="font-size:11px;color:#52525b;margin-bottom:12px;display:flex;justify-content:space-between">
      <span>API key connected ✓</span>
      <button id="clear-key-btn" style="background:none;border:none;color:#52525b;font-size:11px;cursor:pointer;font-family:Georgia,serif;">Clear key</button>
    </div>`;
    html+=`<div class="chat-messages" id="chat-messages">`;
    if(chatMessages.length===0) {
      html+=`<div style="text-align:center;color:#52525b;font-size:13px;padding:20px 0">Ask me anything about your habits, patterns, or goals.</div>`;
    } else {
      chatMessages.forEach(m=>{
        html+=`<div class="chat-msg ${m.role}"><div class="chat-bubble">${m.content.replace(/\n/g,'<br>').replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>')}</div></div>`;
      });
    }
    html+=`</div>`;
    html+=`<div class="chat-input-row">
      <textarea class="chat-input" id="chat-input" rows="2" placeholder="Type a message…"></textarea>
      <button class="chat-send" id="chat-send">Send</button>
    </div>`;
    if(chatMessages.length>0) html+=`<button id="clear-chat-btn" style="width:100%;margin-top:8px;padding:8px;border-radius:8px;border:none;background:transparent;color:#3f3f46;font-size:11px;cursor:pointer;font-family:Georgia,serif;">Clear conversation</button>`;
  }

  el.innerHTML=html;

  // API key save
  const saveKeyBtn=el.querySelector('#save-key-btn');
  if(saveKeyBtn) {
    saveKeyBtn.addEventListener('click',()=>{
      const val=el.querySelector('#api-key-input').value.trim();
      if(!val.startsWith('sk-ant-')) { alert('That doesn\'t look like a valid Anthropic API key (should start with sk-ant-).'); return; }
      localStorage.setItem('sc_anthropic_key',val);
      renderClaude();
    });
  }

  // Clear key
  const clearKeyBtn=el.querySelector('#clear-key-btn');
  if(clearKeyBtn) clearKeyBtn.addEventListener('click',()=>{ if(confirm('Remove saved API key?')){ localStorage.removeItem('sc_anthropic_key'); renderClaude(); } });

  // Clear chat
  const clearChatBtn=el.querySelector('#clear-chat-btn');
  if(clearChatBtn) clearChatBtn.addEventListener('click',()=>{ if(confirm('Clear conversation history?')){ chatMessages=[]; localStorage.removeItem('sc_chat'); renderClaude(); } });

  // Send message
  const sendBtn=el.querySelector('#chat-send');
  const chatInput=el.querySelector('#chat-input');
  if(sendBtn&&chatInput) {
    const doSend=async()=>{
      const msg=chatInput.value.trim(); if(!msg) return;
      chatInput.value=''; sendBtn.disabled=true; sendBtn.textContent='…';
      try {
        await sendToClaude(msg);
      } catch(e) {
        chatMessages.push({role:'assistant',content:`Sorry, something went wrong: ${e.message}`});
      }
      sendBtn.disabled=false; sendBtn.textContent='Send';
      renderClaude();
      setTimeout(()=>{ const msgs=document.getElementById('chat-messages'); if(msgs) msgs.scrollTop=msgs.scrollHeight; },50);
    };
    sendBtn.addEventListener('click',doSend);
    chatInput.addEventListener('keydown',e=>{ if(e.key==='Enter'&&!e.shiftKey){ e.preventDefault(); doSend(); } });
  }

  // Scroll chat to bottom
  setTimeout(()=>{ const msgs=document.getElementById('chat-messages'); if(msgs) msgs.scrollTop=msgs.scrollHeight; },50);
}

      📋 Copy ${activeFmt} → ${yesterFmt} + Reset ${activeFmt}
    </button>
    <div style="font-size:11px;color:#52525b;line-height:1.5">Copies today's data to yesterday, resets today, then switches to yesterday so you can review &amp; submit it.</div>
  </div>`;

  html+=`<div class="section-head">About</div>`;
  html+=`<div class="card" style="font-size:12px;color:#71717a;line-height:2">
    <div>🌿 Sober since November 5, 2025</div>
    <div>🏃 Run days: ${settings.runDays.length?settings.runDays.map(d=>DAY_NAMES[d]).join(', '):'none set'}</div>
    <div>☕ Caffeine limit: 1 caffeinated drink / day</div>
    <div style="margin-top:8px;font-size:11px;color:#3f3f46">${IS_DEV?'⚠️ Dev mode — data saved with dev_ prefix':'Live mode'}</div>
  </div>`;

  el.innerHTML=html;

  el.addEventListener('click', async e=>{
    const btn=e.target.closest('[data-action]');
    if(!btn) return;
    if(btn.dataset.action==='toggleRunDay') {
      const dow=parseInt(btn.dataset.dow);
      const idx=settings.runDays.indexOf(dow);
      if(idx>=0) settings.runDays.splice(idx,1); else settings.runDays.push(dow);
      settings.runDays.sort((a,b)=>a-b);
      await saveSettings(); renderSettings();
    }
    if(btn.dataset.action==='copyToYesterday') {
      const yk = yesterdayKey();
      const activeFmt = new Date(activeDateKey()+'T12:00:00').toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'});
      const yesterFmt = new Date(yk+'T12:00:00').toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'});
      if(confirm(`Copy ${activeFmt}'s data to ${yesterFmt}, then reset ${activeFmt}?\n\nThis will switch you to ${yesterFmt} on the Today tab so you can review and submit it.`)) {
        await copyDayData(activeDateKey(), yk);
      }
    }
    if(btn.dataset.action==='signout') { if(confirm('Sign out?')) signOut(auth); }
  });
}
</script>
</body>
</html>
